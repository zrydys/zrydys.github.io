<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Ocean + Countries Demo</title>

<link rel="stylesheet" href="https://js.arcgis.com/4.34/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.34/"></script>

<style>
html, body, #viewDiv {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
}

/* simple centered menu */
#menu {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99;
  background: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: sans-serif;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="menu">
🌊 Ocean + Countries View
</div>

<div id="viewDiv"></div>

<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/GeoJSONLayer",
    "esri/widgets/LayerList"
], (Map, MapView, GeoJSONLayer, LayerList ) => {

  // 🌊 Ocean basemap
  const map = new Map({
    basemap: "oceans"
  });

  // 🌍 view
  const view = new MapView({
    container: "viewDiv",
    map: map,
    center: [-28, 30],
    zoom: 3
  });

view.when(() => {
  const layerList = new LayerList({
    view: view
  });

  view.ui.add(layerList, "top-right");
});

  // 🌍 Countries GeoJSON (stable Natural Earth)
  const countriesLayer = new GeoJSONLayer({
    url: "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson",
    title: "Countries"
  });

  map.add(countriesLayer);

});
</script>

</body>
</html>
